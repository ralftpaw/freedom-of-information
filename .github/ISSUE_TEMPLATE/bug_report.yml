name: Bug Report
description: Report a bug or defect
title: "[Bug] "
labels: ["bug"]
assignees: ""

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        Brief description of the bug.

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: Language / Tool
      options:
        - TypeScript
        - Python
        - Documentation
        - Other
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      placeholder: |
        Logs, screenshots, environment details...
    validations:
      required: false
